version: "3.8"

networks:
  ecommerce-etl:
    driver: bridge

volumes:
  postgres_data:
  zookeeper_data:
  kafka_data:
  namenode_data:
  datanode_data:
  hbase_data:
  hive_metastore_db:
  airflow_db:
  airflow_logs:
  schema_registry_data:

    # ─────────────────────────────────────────────
    # 1. SOURCE DATABASE (PostgreSQL – E-Commerce)
    # ─────────────────────────────────────────────
services:
  postgres:
    image: debezium/postgres:15
    container_name: ecom_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ecom_user
      POSTGRES_PASSWORD: ecom_pass
      POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"
    healthcheck:
       test: ["CMD-SHELL", "pg_isready -U ecom_user -d ecommerce"]
       interval: 10s
       timeout: 5s
       retries: 10
       start_period: 20s  
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts/postgres:/docker-entrypoint-initdb.d
      - ./data:/data
    networks:
      - ecommerce-etl
    command: [ "postgres", "-c", "wal_level=logical" ]

  # ─────────────────────────────────────────────
  # 2. ZOOKEEPER
  # ─────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: ecom_zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper
    networks:
      - ecommerce-etl

  # ─────────────────────────────────────────────
  # 3. KAFKA BROKER
  # ─────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: ecom_kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s  
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
      # Your custom Kafka client configs and topic init scripts
      - ./kafka/config:/etc/kafka/custom-config
      - ./kafka/scripts:/kafka/scripts
    networks:
      - ecommerce-etl

  # ─────────────────────────────────────────────
  # 4. SCHEMA REGISTRY
  # ─────────────────────────────────────────────
  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    container_name: ecom_schema_registry
    restart: unless-stopped
    depends_on:
      - kafka
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s  
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_SCHEMA_COMPATIBILITY_LEVEL: BACKWARD
    volumes:
      - schema_registry_data:/var/lib/schema-registry
      # Your Avro/Protobuf/JSON schema files to register
      - ./schemas:/schemas
    networks:
      - ecommerce-etl

  # ─────────────────────────────────────────────
  # 5. KAFKA UI
  # ─────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ecom_kafka_ui
    restart: unless-stopped
    depends_on:
      - kafka
      - schema-registry
    ports:
      - "8084:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: ecom-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: kafka-connect
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://kafka-connect:8083
    networks:
      - ecommerce-etl

  # ─────────────────────────────────────────────
  # 6. DEBEZIUM KAFKA CONNECT (CDC)
  # ─────────────────────────────────────────────
  # ─────────────────────────────────────────────
  # 6. CONFLUENT KAFKA CONNECT (CDC via Debezium plugin)
  # ─────────────────────────────────────────────
  kafka-connect:
    image: confluentinc/cp-kafka-connect:7.6.0
    container_name: ecom_kafka_connect
    restart: unless-stopped
    depends_on:
       kafka:
          condition: service_healthy        # ← wait for kafka to be READY
       schema-registry:
          condition: service_healthy        # ← wait for schema-registry to be READY
       postgres:
          condition: service_healthy        # ← wait for postgres to be READY
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:29092
      CONNECT_REST_PORT: 8083
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_GROUP_ID: kafka-connect-group
      # Storage topics
      CONNECT_CONFIG_STORAGE_TOPIC: connect_configs
      CONNECT_OFFSET_STORAGE_TOPIC: connect_offsets
      CONNECT_STATUS_STORAGE_TOPIC: connect_status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      # Avro converters — both key and value point to your Schema Registry
      CONNECT_KEY_CONVERTER: io.confluent.connect.avro.AvroConverter
      CONNECT_VALUE_CONVERTER: io.confluent.connect.avro.AvroConverter
      CONNECT_KEY_CONVERTER_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      CONNECT_VALUE_CONVERTER_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      # Internal converters (for connect's own bookkeeping topics)
      CONNECT_INTERNAL_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_INTERNAL_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      # Plugin path — confluent image already ships Avro + SR jars here
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components
      # Error handling (DLQ)
      CONNECT_ERRORS_TOLERANCE: all
      CONNECT_ERRORS_DEADLETTERQUEUE_TOPIC_NAME: ecom.dlq
      CONNECT_ERRORS_LOG_ENABLE: "true"
      CONNECT_ERRORS_LOG_INCLUDE_MESSAGES: "true"
    # Install the Debezium PostgreSQL connector on startup
  
    command:
      - bash
      - -c
      - |
        confluent-hub install --no-prompt debezium/debezium-connector-postgresql:2.5.4
        /etc/confluent/docker/run
    volumes:
      - ./connectors:/usr/share/confluent-hub-components/custom-connectors
      - ./schemas:/schemas
    networks:
      - ecommerce-etl

  # ─────────────────────────────────────────────
  # 7. APACHE SPARK
  # ─────────────────────────────────────────────
  spark-master:
    image: apache/spark:3.5.0
    container_name: ecom_spark_master
    restart: unless-stopped
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8090:8080"
      - "7077:7077"
    volumes:
      # Your Spark streaming & batch job scripts
      - ./spark/jobs:/opt/spark-apps/jobs
      # Shared utility modules imported by jobs
      - ./spark/utils:/opt/spark-apps/utils
      # Avro schemas used inside Spark for deserialization
      - ./schemas:/opt/spark-apps/schemas
      # Spark output logs you want to inspect locally
      - ./spark/logs:/opt/spark-apps/logs
    networks:
      - ecommerce-etl

  spark-worker:
    image: apache/spark:3.5.0
    container_name: ecom_spark_worker
    restart: unless-stopped
    depends_on:
      - spark-master
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    volumes:
      # Worker must mirror master mounts — it executes the actual tasks
      - ./spark/jobs:/opt/spark-apps/jobs
      - ./spark/utils:/opt/spark-apps/utils
      - ./schemas:/opt/spark-apps/schemas
      - ./spark/logs:/opt/spark-apps/logs
    networks:
      - ecommerce-etl

  # ─────────────────────────────────────────────
  # 8. HDFS (Data Lake)
  # ─────────────────────────────────────────────
  hdfs-namenode:
    image: apache/hadoop:3
    container_name: ecom_hdfs_namenode
    restart: unless-stopped
    hostname: namenode
    user: root                          # ← ADD THIS
    environment:
      HADOOP_HOME: /opt/hadoop
    command:
      - bash
      - -c
      - |
        mkdir -p /hadoop/dfs/name
        if [ ! -d /hadoop/dfs/name/current ]; then
        hdfs namenode -format -force
        fi
        hdfs namenode
    ports:
      - "9870:9870"
      - "9000:9000"
    volumes:
      - namenode_data:/hadoop/dfs/name
      - ./hadoop-config:/opt/hadoop/etc/hadoop
    networks:
    - ecommerce-etl

  hdfs-datanode:
    image: apache/hadoop:3
    container_name: ecom_hdfs_datanode
    restart: unless-stopped
    hostname: datanode
    user: root                          # ← ADD THIS
    depends_on:
      - hdfs-namenode
    environment:
      HADOOP_HOME: /opt/hadoop
    command:
      - bash
      - -c
      - |
        mkdir -p /hadoop/dfs/data
        hdfs datanode
    volumes:
      - datanode_data:/hadoop/dfs/data
      - ./hadoop-config:/opt/hadoop/etc/hadoop
    networks:
      - ecommerce-etl

